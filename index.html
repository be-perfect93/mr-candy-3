  *{box-sizing:border-box;}
  html,body{
    overflow-x:hidden;
    min-height:100%;
  }
  body{
    margin:0;
    display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
    gap:0;padding:0;
    min-height:100dvh;
    font-family:'Trebuchet MS','Segoe UI',sans-serif;color:#fff;
    background-image:var(--img-bg);
    background-size:cover;
    background-position:center top;
    background-repeat:no-repeat;
    background-color:#1e3a6b;
    -webkit-tap-highlight-color:transparent;
  }
  .scale-wrap{ width:100%; display:flex; justify-content:center; }
  .scale-inner{
    display:flex;flex-direction:column;align-items:center;
    gap:0;padding:18px;
    transform-origin:top center;
    width:max-content;
  }

  /* ===== mascot (thay title) — nhân vật cười, chỉ từ bụng trở lên, đứng trên thanh progress =====
     Nằm trong LUỒNG LAYOUT bình thường (không absolute, không margin âm, không z-index) —
     tránh mọi lỗi chồng lớp / lòi ra sau / dư chiều cao gây thanh scroll. */
  .mascot-crop{
    width:220px;
    margin:0 auto;
    text-align:center;
  }
  .mascot-svg{ width:190px; height:126px; display:block; margin:0 auto; filter:drop-shadow(0 6px 8px rgba(0,0,0,.35)); }
  .mascot-img{ width:190px; height:126px; display:block; margin:0 auto; filter:drop-shadow(0 6px 8px rgba(0,0,0,.35)); background-image:var(--img-mascot); background-size:contain; background-repeat:no-repeat; background-position:center bottom; }

  /* ===== board (khung viền đá) — giờ là lớp TRONG SUỐT đè lên vùng board của .game-frame,
     không tự vẽ nền/viền nữa vì ảnh reel_update1.png đã có sẵn khung đá + hốc lưới ở đây.
     Toạ độ đo trực tiếp từ ảnh gốc 916x1570: vùng board = y 210→647 (13.376%→41.21%). */
  .stage{
    position:absolute;
    left:0; right:0;
    top:13.376%;
    height:27.834%; /* (647-210)/1570 */
    z-index:6;
    background:transparent;
    border:none;
    box-shadow:none;
    padding:0;
  }
  .icicles{ display:none; }
  .frost-corner{ display:none; }
  .board{
    position:absolute;
    left:50%; top:50%;
    transform:translate(-50%,-50%);
    width:calc(6*var(--cell) + 5*var(--gap));
    height:calc(3*var(--cell) + 2*var(--gap) + var(--stagger-buffer));
    background:transparent;
    overflow:visible;
  }
  .cell-slot{
    position:absolute;width:var(--cell);height:var(--cell);
    border-radius:9px;background:transparent;
    overflow:hidden;
  }
  .hex-scanner{ display:none; }
  /* half-hexagon riser: ẩn vì ảnh nền reel_lower_1.png đã có sẵn pattern lệch cột */
  .pedestal-riser{ display:none; }
  .pedestal-riser::after{ display:none; }

  .candy{
    position:absolute;width:var(--cell);height:var(--cell);
    display:flex;align-items:center;justify-content:center;
    transition: top .336s cubic-bezier(.35,1.1,.5,1), left .336s ease, transform .18s, opacity .2s;
    z-index:2;
  }
  .candy.win{animation:pop .45s ease;z-index:5;}
  .candy.clearing{opacity:0;transform:scale(.15) rotate(150deg);}
  .candy.transform-flash{animation:flash .5s ease;}
  .candy.feature-transform{animation:featureBurst .75s cubic-bezier(.3,1.4,.4,1);z-index:6;}
  .candy.rolling-left{ animation:rollLeft var(--roll-duration, .336s) linear; }
  .candy.rolling-right{ animation:rollRight var(--roll-duration, .336s) linear; }
  @keyframes pop{
    0%{transform:scale(1);} 40%{transform:scale(1.3);filter:brightness(1.9) drop-shadow(0 0 10px #fff);} 100%{transform:scale(1);}
  }
  @keyframes flash{
    0%{filter:brightness(1);} 50%{filter:brightness(3) drop-shadow(0 0 16px #fff);transform:scale(1.25);} 100%{filter:brightness(1);}
  }
  @keyframes featureBurst{
    0%{transform:scale(1) rotate(0deg); filter:brightness(1);}
    30%{transform:scale(.25) rotate(120deg); filter:brightness(2.6) drop-shadow(0 0 4px #fff);}
    55%{transform:scale(1.55) rotate(230deg); filter:brightness(3) drop-shadow(0 0 22px #fff176);}
    80%{transform:scale(.9) rotate(340deg); filter:brightness(1.6) drop-shadow(0 0 10px #fff);}
    100%{transform:scale(1) rotate(360deg); filter:brightness(1);}
  }
  @keyframes rollLeft{ from{transform:rotate(0deg);} to{transform:rotate(-360deg);} }
  @keyframes rollRight{ from{transform:rotate(0deg);} to{transform:rotate(360deg);} }

  .orb{
    /* đường kính = khoảng cách giữa 2 tâm ô kề nhau (cell+gap) → 2 viên bi cạnh nhau chạm sát,
       không còn khoảng hở giữa chúng, bất kể --cell/--gap thay đổi theo màn hình */
    width:calc(var(--cell) + var(--gap));height:calc(var(--cell) + var(--gap));
    border-radius:50%;position:relative;
    background-size:contain; background-repeat:no-repeat; background-position:center;
  }
  .orb.wild{ background-image:var(--img-wild); }
  .L1{ background-image:var(--img-l1); }
  .L2{ background-image:var(--img-l2); }
  .L3{ background-image:var(--img-l3); }
  .L4{ background-image:var(--img-l4); }
  .H1{ background-image:var(--img-h1); }
  .H2{ background-image:var(--img-h2); }
  .H3{ background-image:var(--img-h3); }
  .H4{ background-image:var(--img-h4); }

  /* ===== KHUNG NỀN LIỀN MẠCH (level-panel + stage + plinko) =====
     Toàn bộ 3 khối giờ dùng CHUNG một ảnh nền duy nhất (reel_update1.png, tỉ lệ gốc 916:1570),
     nên viền đá không bị đứt đoạn / lộ mí giữa các khối. .level-panel / .stage / .plinko-svg-wrap
     chỉ còn là các lớp NỘI DUNG trong suốt, định vị tuyệt đối bên trong .game-frame. */
  .game-frame{
    position:relative;
    /* Ảnh gốc reel_update1.png = 916 x 1570px. Vùng board (nơi 6 cột symbol nằm) đo được
       cao 437px trong ảnh gốc (y:210→647). Board thực tế cố định 204px cao (3*cell+2*gap+buffer),
       nên scale = 204/437 ≈ 0.46682 → full width ≈ 427.6px. Dùng scale theo CHIỀU CAO (không phải
       chiều rộng) để board khớp khít cả 2 chiều, tránh tràn dọc. */
    width:427.6px;
    aspect-ratio: 916 / 1570;
    margin:0 auto;
    background-image:var(--img-reelframe);
    background-size:100% 100%;
    background-repeat:no-repeat;
    z-index:100;
  }
  /* ===== level meter (khung mốc 10/20/40/60 + FG) — lớp trong suốt đè lên phần trên của game-frame ===== */
  .level-panel{
    position:absolute;
    left:0; right:0; top:0;
    z-index:5;
    height:13.248%; /* 208/1570 */
    background:transparent;
    padding:0;
    margin:0;
    overflow:visible;
  }
  .battlement{ display:none; }
  .level-panel::after{ display:none; }
  /* Track thanh progress — hiển thị lại (đã bị ẩn nhầm trước đó), đặt đúng vào rãnh đá ngang giữa khung ảnh */
  .level-track-wrap{ position:absolute; left:6.66%; right:6.99%; top:41%; height:19%; z-index:1; }
  .level-track{
    position:relative;
    height:80%;
    top:10%;
    border-radius:10px;
    background:rgba(0,0,0,.25);
    overflow:hidden;
    box-shadow:inset 0 1px 3px rgba(0,0,0,.5);
  }
  .level-fill{
    display:block;
    position:absolute; left:0; top:0; bottom:0; width:0%;
    background:linear-gradient(90deg,#fff2b0,#ffce4d,#e0a70f);
    transition:width .4s ease;
    border-radius:10px;
  }
  .level-marks{ position:absolute; inset:0; z-index:2; opacity:0; } /* ẩn wrapper cũ (không dùng % nội bộ nữa) */
  /* Overlay ngôi sao MỚI: dùng ảnh PNG sao thật (star10/20/40/60.png) do người dùng cung cấp,
     đặt đè lên đúng vị trí mốc trong ảnh nền reel_update1.png. ẨN HOÀN TOÀN cho đến khi đạt mốc —
     chỉ XUẤT HIỆN (pop-in) đúng lúc đạt mốc đó, giữ nguyên hành vi gốc. */
  .star-glow{
    position:absolute; top:44%; transform:translate(-50%,-50%) scale(.3);
    width:34px; height:34px;
    z-index:10; /* luôn nổi trên .level-track-wrap (z-index:1) để thanh progress không đè lên sao */
    background-size:contain; background-repeat:no-repeat; background-position:center;
    opacity:0;
    visibility:hidden;
    pointer-events:none;
    transition:opacity .3s, transform .3s, visibility .3s;
    transform-origin:center;
  }
  .star-glow.lvl-1{ background-image:var(--img-star10); }
  .star-glow.lvl-2{ background-image:var(--img-star20); }
  .star-glow.lvl-3{ background-image:var(--img-star40); }
  .star-glow.lvl-4{ width:46px; height:46px; background-image:var(--img-star60); }
  .star-glow.reached{
    opacity:1;
    visibility:visible;
    transform:translate(-50%,-50%) scale(1);
    filter:drop-shadow(0 0 8px rgba(255,225,140,.9));
    animation:starPopIn .35s cubic-bezier(.34,1.56,.64,1);
  }
  .star-glow.lvl-4.reached{
    animation:badgeGlow 1.6s ease-in-out infinite;
  }
  /* số mốc symbol — ẩn vì ảnh nền đã in sẵn 10/20/40/60 */
  .star-num{ display:none; }
  .level-badge{ position:absolute; top:44%; transform:translate(-50%,-50%); }
  @keyframes starPopIn{
    0%{ transform:scale(.2) rotate(-25deg); opacity:0; }
    60%{ transform:scale(1.25) rotate(8deg); opacity:1; }
    100%{ transform:scale(1) rotate(0deg); opacity:1; }
  }
  .level-badge.lvl-4.reached .star-shape{
    animation:badgeGlow 1.6s ease-in-out infinite;
  }
  @keyframes badgeGlow{
    0%,100%{ filter:drop-shadow(0 0 10px rgba(255,225,140,.9)); }
    50%{ filter:drop-shadow(0 0 18px rgba(255,225,140,1)) brightness(1.2); }
  }

  /* floating badge over the board, only visible during free spins */
  .fs-badge{
    position:absolute; top:6px; right:6px; z-index:11;
    display:flex; align-items:center; gap:5px;
    background:linear-gradient(180deg,#ff5ea8,#ff2d78);
    padding:5px 10px; border-radius:14px;
    font-size:10px; font-weight:900; letter-spacing:.5px;
    box-shadow:0 4px 10px rgba(0,0,0,.5);
    opacity:0; transform:translateY(-6px); transition:opacity .25s, transform .25s;
    pointer-events:none;
  }
  .fs-badge.show{ opacity:1; transform:translateY(0); }
  .fs-badge span{ font-size:15px; color:#ffe08a; }


  button{
    font-family:inherit;border:none;cursor:pointer;
    -webkit-tap-highlight-color:transparent;
  }
  button:disabled{ cursor:not-allowed; }

  /* ===== PG Soft-style bottom control bar ===== */
  .bottom-bar{
    display:flex;align-items:center;justify-content:center;gap:10px;
    background:linear-gradient(180deg,#1a1030,#0d0620);
    border-radius:16px;
    padding:8px 14px;
    box-shadow:0 0 0 2px rgba(255,209,102,.25), 0 6px 16px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.05);
  }
  .bb-label{ display:block; font-size:8.5px; letter-spacing:.5px; opacity:.55; }
  .bb-stat{ min-width:78px; text-align:center; }
  .bb-value{ display:block; font-size:15px; font-weight:900; color:#ffe08a; }

  .bb-bet{ display:flex; align-items:center; gap:6px; }
  .bb-chevron{
    width:26px;height:26px;border-radius:50%;padding:0;
    display:flex;align-items:center;justify-content:center;
    font-size:15px;line-height:1;
    background:linear-gradient(180deg,#4a4a68,#2a2a42);
    box-shadow:0 2px 0 #17172a, inset 0 1px 0 rgba(255,255,255,.15);
    color:#fff;
  }
  .bb-bet-value{ text-align:center; min-width:52px; font-weight:900; font-size:13px; color:#fff; }
  .bb-bet-value .bb-label{ opacity:.55; }

  .bb-spin{
    width:64px;height:64px;border-radius:50%;padding:0;
    display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle at 35% 30%, #ffe27a, #ff9f1c 65%, #c9720a 100%);
    box-shadow:0 0 0 4px #1a1030, 0 0 0 6px #ffd166, 0 5px 0 #b5680a, 0 8px 18px rgba(0,0,0,.5);
    position:relative;
    transition:transform .08s;
  }
  .bb-spin:active{ transform:translateY(3px); }
  .bb-spin:disabled{ opacity:.6; }
  .bb-spin-icon{
    width:26px;height:26px;
    border:4px solid #4a2400;
    border-right-color:transparent;
    border-radius:50%;
    position:relative;
  }
  .bb-spin-icon::after{
    content:"";
    position:absolute; top:-4px; right:-2px;
    width:0;height:0;
    border-style:solid;
    border-width:5px 0 5px 8px;
    border-color:transparent transparent transparent #4a2400;
    transform:rotate(0deg);
  }
  .bb-spin.is-spinning .bb-spin-icon{
    border:none;
    width:18px;height:18px;
    border-radius:4px;
    background:#4a2400;
  }
  .bb-spin.is-spinning .bb-spin-icon::after{ display:none; }

  .bb-auto{
    width:40px;height:40px;border-radius:50%;padding:0;
    display:flex;align-items:center;justify-content:center;
    background:linear-gradient(180deg,#4a4a68,#2a2a42);
    box-shadow:0 3px 0 #17172a, inset 0 1px 0 rgba(255,255,255,.15);
    font-size:16px;font-weight:900;color:#8f8fc0;
  }
  .bb-auto.active{
    background:linear-gradient(180deg,#6bff8f,#2fae2f);
    color:#0a3312;
    box-shadow:0 3px 0 #1a5c1a, 0 0 12px rgba(107,255,143,.6);
  }
  .bb-chevron:disabled, .bb-auto:disabled{ opacity:.5; }

  .banner{
    position:absolute;top:6px;left:50%;transform:translateX(-50%);
    background:linear-gradient(180deg,#ff5ea8,#ff2d78);
    padding:5px 16px;border-radius:18px;font-weight:bold;font-size:13px;
    box-shadow:0 4px 10px rgba(0,0,0,.5);
    opacity:0;transition:opacity .25s, transform .25s;
    pointer-events:none;z-index:10;white-space:nowrap;
    max-width:90%;
    text-align:center;
  }
  .banner.show{opacity:1;transform:translateX(-50%) translateY(4px);}

  /* ===== feature banner (text chạy ngang uốn lượn kiểu Candy Crush, tự fade out) ===== */
  .feature-banner-wrap{
    position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    pointer-events:none; overflow:hidden;
    z-index:200;
  }
  .feature-banner{
    position:relative;
    display:flex; flex-direction:column; align-items:center; gap:4px;
    white-space:nowrap;
    opacity:0;
    animation: featureBannerMove 2.6s cubic-bezier(.2,.7,.3,1) forwards;
  }
  @keyframes featureBannerMove{
    0%{   opacity:0; transform:translateX(60vw) scale(.7); }
    12%{  opacity:1; transform:translateX(0) scale(1.06); }
    22%{  transform:translateX(0) scale(1); }
    78%{  opacity:1; transform:translateX(0) scale(1); }
    100%{ opacity:0; transform:translateX(-55vw) scale(.8); }
  }
  .feature-banner-title{
    font-size:22px; font-weight:900; letter-spacing:1px;
    color:#fff176; text-shadow:0 3px 8px rgba(0,0,0,.7), 0 0 14px rgba(255,241,118,.6);
    display:flex;
  }
  .feature-banner-title span{
    display:inline-block;
    animation: letterWave 1.1s ease-in-out infinite;
  }
  @keyframes letterWave{
    0%,100%{ transform:translateY(0) rotate(0deg); }
    50%{ transform:translateY(-9px) rotate(-4deg); }
  }
  .feature-banner-content{
    font-size:13.5px; color:#eaf6ff; text-align:center;
    text-shadow:0 2px 6px rgba(0,0,0,.7);
    max-width:min(84vw, 360px);
    background:rgba(10,25,50,.55);
    padding:5px 14px; border-radius:12px;
  }

  .stage.fs-mode{ box-shadow:0 0 0 4px #ff2d78, 0 0 0 8px #ffd166, 0 0 40px rgba(255,45,120,.8), inset 0 0 50px rgba(0,0,0,.35); }

  @media (max-width: 640px){
    .bottom-bar{
      width:100%; max-width:calc(6*56px + 5*4px + 32px);
      flex-wrap:wrap; gap:6px; padding:8px 10px;
    }
    .bb-stat{ min-width:58px; }
    .bb-value{ font-size:13px; }
    .bb-bet-value{ min-width:42px; font-size:12px; }
    .bb-chevron{ width:22px;height:22px;font-size:13px; }
    .bb-spin{ width:54px;height:54px; }
    .bb-spin-icon{ width:20px;height:20px; }
    .bb-auto{ width:34px;height:34px;font-size:14px; }
  }

  /* ===================== CLUSTER PLINKO — LUÔN HIỂN THỊ CỐ ĐỊNH ===================== */
  /* Reel cố định 3x6 (không còn co/giãn theo cluster nữa). Plinko là 1 phần tĩnh của layout,
     nằm ngay dưới reel trong cùng khung viền ảnh — không tự vẽ nền/viền nữa vì ảnh
     reel_update1.png đã có sẵn khung hầm tím ở đây (y 650→1570, tức 41.4%→100%). */
  .plinko-dock{
    position:absolute;
    left:0; right:0;
    top:41.4%; bottom:0;
  }
  .plinko-sub{
    position:absolute; top:9%; left:0; right:0;
    text-align:center; font-size:11.5px; color:#e7d9ff; opacity:.9;
    text-shadow:0 1px 3px rgba(0,0,0,.6);
  }
  .plinko-svg-wrap{
    position:absolute;
    left:6.9%; right:6.6%;
    top:16.5%; bottom:14%; /* chừa chỗ dưới cho plinko-result + plinko-level-badge, né 2 cột đá nhô ở giữa vòm */
    background:transparent;
    border:none;
    box-shadow:none;
    padding:0;
  }
  .plinko-svg-wrap svg{ display:block; width:100%; height:auto; }
  .plinko-peg{ fill:#d8d0e8; stroke:#8f80c0; stroke-width:1; }
  .plinko-ball{
    position:absolute; width:16px; height:16px; border-radius:50%;
    box-shadow:0 2px 6px rgba(0,0,0,.5), 0 0 8px rgba(140,220,255,.6);
    left:0; top:0; will-change:transform;
    pointer-events:none;
    background-color:#7fd1ff;
  }
  .plinko-slots-row{
    display:flex; gap:3px; padding:8px 4px 10px;
  }
  .plinko-slot{
    flex:1;
    display:flex; align-items:center; justify-content:center;
    height:32px;
    font-size:11px; font-weight:800; color:#3a2405;
    border-radius:4px;
    border-bottom:4px solid rgba(0,0,0,.28);
    box-shadow:inset 0 2px 3px rgba(255,255,255,.4);
    transition:transform .15s ease, filter .15s ease;
  }
  .plinko-slot.hit{ transform:translateY(-3px) scale(1.05); filter:brightness(1.25); }
  .plinko-result{
    position:absolute; left:0; right:0; bottom:8%;
    text-align:center;
    font-size:13.5px; font-weight:800; color:#fff17a;
    text-shadow:0 2px 6px rgba(0,0,0,.6);
    min-height:18px;
  }
  .plinko-level-badge{
    position:absolute; left:0; right:0; bottom:2.5%;
    text-align:center; font-size:12px; font-weight:800; color:#ffe27a;
    text-shadow:0 1px 3px rgba(0,0,0,.6);
  }
</style>

<body>

<div class="scale-wrap"><div class="scale-inner" id="scaleInner">

<div class="mascot-crop" style="display:none">
  <div class="mascot-img"></div>
</div>

<div class="game-frame" id="gameFrame">
  <div class="level-panel">
    <div class="battlement">
      <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
    </div>
    <div class="level-track-wrap">
      <div class="level-track"><div class="level-fill" id="levelFill"></div></div>
      <div class="level-marks" id="levelMarks"></div>
    </div>
  </div>

  <div class="stage" id="stageEl">
    <div class="banner" id="banner"></div>
    <div class="fs-badge" id="fsBadge"><span id="fsRemaining">0</span> FREE SPINS</div>
    <div class="board" id="board"></div>
  </div>

  <div class="plinko-dock" id="plinkoDock">
    <div class="plinko-sub" id="plinkoSub">Bàn Plinko — mỗi cụm nổ sẽ thả 1 viên bi</div>
    <div class="plinko-svg-wrap" id="plinkoSvgWrap"></div>
    <div class="plinko-result" id="plinkoResult">&nbsp;</div>
    <div class="plinko-level-badge" id="plinkoLevelBadge">Level hiện tại: 0</div>
  </div>
</div>

<div class="bottom-bar" style="margin-top:16px;">
  <div class="bb-stat">
    <span class="bb-label">BALANCE</span>
    <span class="bb-value" id="balance">1000.00</span>
  </div>

  <div class="bb-bet">
    <button class="bb-chevron" id="betMinus">−</button>
    <div class="bb-bet-value">
      <span class="bb-label">BET</span>
      <span id="betLabel">1.00</span>
    </div>
    <button class="bb-chevron" id="betPlus">+</button>
  </div>

  <button class="bb-spin" id="spinBtn"><span class="bb-spin-icon"></span></button>

  <button class="bb-auto" id="autoBtn" title="Autoplay"><span class="bb-auto-icon">∞</span></button>

  <div class="bb-stat">
    <span class="bb-label">WIN</span>
    <span class="bb-value" id="winDisplay">0.00</span>
  </div>
</div>

</div></div>

<div class="feature-banner-wrap" id="featureBannerWrap"></div>

<script>
(function(){
  "use strict";

  // ===================== CONFIG =====================
  const COLS = 6, ROWS = 3;
  const CELL = 56, GAP = 4, STEP = CELL + GAP;
  const MIN_CLUSTER = 5; // tối thiểu 5 symbol liền kề mới tính thắng
  // reel 2, 4, 6 (0-indexed 1,3,5) sit half a cell higher on a hex-riser, matching Cygnus 4's staggered reels
  const STAGGER_COLS = new Set([1,3,5]);
  const STAGGER_OFFSET = CELL/2;
  // extra head-room at the top so staggered columns' topmost symbol never gets clipped by the board
  const TOP_BUFFER = STAGGER_OFFSET;
  const BOARD_H = ROWS * STEP - GAP + TOP_BUFFER;

  const LOW_TYPES  = ["L1","L2","L3","L4"];
  const HIGH_TYPES = ["H1","H2","H3","H4"];
  const PAY_TYPES  = [...HIGH_TYPES, ...LOW_TYPES];
  const HIGHPAY = new Set(HIGH_TYPES);
  const LOWPAY  = new Set(LOW_TYPES);

  const FILL_TYPES  = ["L1","L2","L3","L4","H1","H2","H3","H4","WILD"];
  const FILL_WEIGHT = [ 20 , 20 , 20 , 20 ,  4.5,  4.5,  4.5,  4.5,  1.5];

  // Mốc số symbol tích luỹ để lên level (kích hoạt tính năng biến symbol tương ứng).
  const LEVEL_MARKS = [5,10,15,20];

  // pay per cluster-size tier (× bet)
  const PAY_TABLE = {
    HIGH: [[15,3],[11,1.5],[8,0.6],[5,0.25]],
    LOW:  [[15,1],[11,0.5],[8,0.2],[5,0.08]],
    WILD: [[15,6],[11,3],[8,1.2],[5,0.5]]
  };
  function payMultiplier(type, size){
    const table = type==="WILD" ? PAY_TABLE.WILD : (HIGHPAY.has(type) ? PAY_TABLE.HIGH : PAY_TABLE.LOW);
    for(const [minSize, mult] of table) if(size>=minSize) return mult;
    return 0;
  }

  function weightedFill(){
    const total = FILL_WEIGHT.reduce((a,b)=>a+b,0);
    let r = Math.random()*total;
    for(let i=0;i<FILL_TYPES.length;i++){
      if(r < FILL_WEIGHT[i]) return FILL_TYPES[i];
      r -= FILL_WEIGHT[i];
    }
    return "L1";
  }

  function levelBand(n){
    if(n < LEVEL_MARKS[0]) return 0;
    if(n < LEVEL_MARKS[1]) return 1;
    if(n < LEVEL_MARKS[2]) return 2;
    if(n < LEVEL_MARKS[3]) return 3;
    return 4;
  }


  // ===================== STATE =====================
  let board = [];               // board[c][r], r=0 bottom
  let balance = 1000, bet = 1;
  let spinning = false, autoPlay = false;
  let avalancheCount = 0;
  let pendingPlinkoPromises = []; // Plinko chạy NGẦM, không block cascade — round chỉ chờ hết mảng này khi thực sự kết thúc
  let freeSpinsRemaining = 0;
  let inFreeSpins = false;
  let levelReached = 0;         // level cao nhất đã đạt trong spin hiện tại (0-3) — quyết định bảng Plinko
  let featureAppliedUpTo = 0;   // level cao nhất đã ÁP DỤNG tính năng biến symbol (để chỉ chạy 1 lần/level)

  // ===================== DOM =====================
  const boardEl = document.getElementById("board");
  const balanceEl = document.getElementById("balance");
  const winDisplayEl = document.getElementById("winDisplay");
  const betLabelEl = document.getElementById("betLabel");
  const spinBtn = document.getElementById("spinBtn");
  const autoBtn = document.getElementById("autoBtn");
  const bannerEl = document.getElementById("banner");
  const stageEl = document.querySelector(".stage");
  const levelFillEl = document.getElementById("levelFill");
  const levelMarksEl = document.getElementById("levelMarks");
  const fsRemainingEl = document.getElementById("fsRemaining");
  const fsBadgeEl = document.getElementById("fsBadge");
  const featureBannerWrap = document.getElementById("featureBannerWrap");

  // Vị trí % (theo chiều rộng .game-frame) của 4 ngôi sao đã VẼ SẴN trong ảnh nền reel_update1.png —
  // đo trực tiếp từ ảnh gốc (916x1570), theo THỨ TỰ mốc (không phụ thuộc giá trị số của mốc):
  //   sao 1 → 24.56%   sao 2 → 36.57%   sao 3 → 61.68%   sao 4 (FG) → 85.70%
  // levelBadgeEls giờ chỉ tạo lớp GLOW đè lên đúng vị trí sao có sẵn, không vẽ ảnh sao riêng nữa.
  const LEVEL_MARK_LEFT_PCT = [24.56, 36.57, 61.68, 85.70];
  const levelPanelEl = document.querySelector(".level-panel");
  const levelBadgeEls = [];
  LEVEL_MARKS.forEach((v,i)=>{
    const pct = LEVEL_MARK_LEFT_PCT[i];
    const badge = document.createElement("div");
    badge.className = "star-glow lvl-"+(i+1);
    badge.style.left = pct+"%";
    levelPanelEl.appendChild(badge);
    levelBadgeEls.push({mark:v, el:badge});
  });

  function rowTopY(rb){ return BOARD_H - (rb+1)*STEP + GAP; }
  const cellSlotEls = Array.from({length:COLS}, ()=>new Array(ROWS).fill(null));
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const slot = document.createElement("div");
      slot.className = "cell-slot";
      slot.style.left = (c*STEP)+"px";
      slot.style.top = (rowTopY(r) - (STAGGER_COLS.has(c) ? STAGGER_OFFSET : 0))+"px";
      boardEl.appendChild(slot);
      cellSlotEls[c][r] = slot;
    }
  }
  // hex risers sit flush at the bottom of the board, inside it, so there's no seam with the reel frame
  STAGGER_COLS.forEach(c=>{
    const riser = document.createElement("div");
    riser.className = "pedestal-riser";
    riser.style.left = (c*STEP)+"px";
    boardEl.appendChild(riser);
  });

  function createSymbolEl(type){
    const el = document.createElement("div");
    el.className = "candy";
    const orb = document.createElement("div");
    if(type==="WILD") orb.className = "orb wild";
    else if(HIGHPAY.has(type)) orb.className = "orb stripe "+type;
    else orb.className = "orb "+type;
    el.appendChild(orb);
    boardEl.appendChild(el);
    return el;
  }
  function setOrbClass(cell){
    const orb = cell.el.firstChild;
    if(cell.type==="WILD") orb.className = "orb wild";
    else if(HIGHPAY.has(cell.type)) orb.className = "orb stripe "+cell.type;
    else orb.className = "orb "+cell.type;
  }
  function place(el,c,r){
    el.style.left = (c*STEP)+"px";
    el.style.top = (rowTopY(r) - (STAGGER_COLS.has(c) ? STAGGER_OFFSET : 0)) + "px";
  }
  function syncVisuals(){
    for(let c=0;c<COLS;c++)
      board[c].forEach((cell,r)=>{ if(cell) place(cell.el,c,r); });
  }

  // ===================== UI =====================
  function updateHUD(totalWin){
    balanceEl.textContent = balance.toFixed(2);
    betLabelEl.textContent = bet.toFixed(2);
    winDisplayEl.textContent = totalWin.toFixed(2);
  }
  function updateLevelUI(n){
    if(inFreeSpins){
      // Free game: luôn ở level cuối (6x6) — thanh level KHÔNG reset về 0 giữa các lượt free spin.
      levelFillEl.style.width = "100%";
      levelBadgeEls.forEach(b=>b.el.classList.add("reached"));
      return;
    }
    const capped = Math.min(n, LEVEL_MARKS[LEVEL_MARKS.length-1]);
    levelFillEl.style.width = (capped / LEVEL_MARKS[LEVEL_MARKS.length-1] * 100) + "%";
    levelBadgeEls.forEach(b=>b.el.classList.toggle("reached", n>=b.mark));
  }
  function updateFsUI(){
    fsRemainingEl.textContent = freeSpinsRemaining;
    fsBadgeEl.classList.toggle("show", freeSpinsRemaining>0 || inFreeSpins);
  }
  function showBanner(text){
    bannerEl.textContent = text;
    bannerEl.classList.add("show");
    setTimeout(()=>bannerEl.classList.remove("show"), 1100);
  }
  // Banner thông báo feature (level 1/2/3, Free Spins Won...): text chạy ngang qua màn hình,
  // từng chữ uốn lượn lên xuống kiểu Candy Crush, rồi tự mờ dần và biến mất — không cần bấm OK.
  function showFeatureBanner(title, content, durationMs){
    durationMs = durationMs || 2600;
    return new Promise(resolve=>{
      const wrap = document.createElement("div");
      wrap.className = "feature-banner";
      wrap.style.animationDuration = durationMs+"ms";

      const titleEl = document.createElement("div");
      titleEl.className = "feature-banner-title";
      [...title].forEach((ch,i)=>{
        const span = document.createElement("span");
        span.textContent = ch;
        span.style.animationDelay = (i*0.06)+"s";
        titleEl.appendChild(span);
      });
      wrap.appendChild(titleEl);

      if(content){
        const contentEl = document.createElement("div");
        contentEl.className = "feature-banner-content";
        contentEl.textContent = content;
        wrap.appendChild(contentEl);
      }

      featureBannerWrap.appendChild(wrap);
      setTimeout(()=>{
        wrap.remove();
        resolve();
      }, durationMs);
    });
  }
  function sleep(ms){ return new Promise(res=>setTimeout(res,ms)); }

  // Biến hình 1 nhóm symbol theo kiểu "lan toả": mỗi symbol đổi loại + nổ animation cách nhau
  // 1 nhịp nhỏ, tạo hiệu ứng sóng lan qua bàn cờ thay vì đổi màu tức thì cùng lúc.
  function staggeredTransform(cells, mutateFn){
    const stagger = 70;
    return new Promise(resolve=>{
      if(cells.length===0){ resolve(); return; }
      cells.forEach((cell, i)=>{
        setTimeout(()=>{
          mutateFn(cell);
          cell.el.classList.add("feature-transform");
          setTimeout(()=>cell.el.classList.remove("feature-transform"), 760);
        }, i*stagger);
      });
      setTimeout(resolve, (cells.length-1)*stagger + 760);
    });
  }

  // ===================== BOARD OPS =====================
  // Reset bàn về trống — reel cố định 3x6, không còn khái niệm "mở khoá thêm hàng" nữa.
  function resetBoard(){
    boardEl.querySelectorAll(".candy").forEach(el=>el.remove());
    board = Array.from({length:COLS}, ()=>new Array(ROWS).fill(null));
    levelReached = 0; featureAppliedUpTo = 0;
    if(window.PlinkoFeature) window.PlinkoFeature.setLevel(0, false);
  }

  // Thời gian chờ 1 lần rơi (single-shot, mọi khoảng cách đều rơi trong đúng khoảng này —
  // đây là tốc độ "nhanh" chuẩn, dùng chung cho cả rơi-sau-cluster và tumble-từ-trên-cao).
  const FALL_WAIT_MS = 368;

  // Trả về số ms cần chờ để symbol mới rơi xong (caller dùng để sleep đúng khoảng thời gian).
  function fillColumns(){
    let filledAny = false;
    for(let c=0;c<COLS;c++){
      let count = 0;
      for(let r=0;r<ROWS;r++) if(board[c][r]) count++;
      let spawnOffset = 1;
      for(let r=count;r<ROWS;r++){
        filledAny = true;
        const type = weightedFill();
        const el = createSymbolEl(type);
        el.style.left = (c*STEP)+"px";
        el.style.top = rowTopY(ROWS + spawnOffset)+"px";
        board[c][r] = {type, el};
        spawnOffset++;
      }
    }
    requestAnimationFrame(()=>requestAnimationFrame(syncVisuals));
    return filledAny ? FALL_WAIT_MS : 0;
  }

  // ===================== PHASE 1: RƠI THẲNG 90° (pure vertical gravity) =====================
  // Dồn thẳng 1 lần duy nhất cho mỗi cột (không lặp từng hàng) — mọi symbol rơi trong ĐÚNG
  // 1 nhịp rơi (single-shot), bất kể rơi xa hay gần, khớp tốc độ "nhanh" chuẩn với fillColumns.
  async function settleGravity(){
    let moved = false;
    for(let c=0;c<COLS;c++){
      const stacked = board[c].filter(x=>x); // dồn hết symbol xuống đáy, giữ đúng thứ tự
      for(let r=0;r<ROWS;r++){
        const next = r<stacked.length ? stacked[r] : null;
        if(board[c][r] !== next) moved = true;
        board[c][r] = next;
      }
    }
    if(!moved) return;
    syncVisuals();
    await sleep(FALL_WAIT_MS);
  }

  // ===================== PHASE 2: AVALANCHE — LĂN CHÉO (lock/unlock theo từng viên) =====================
  // Chạy SAU KHI phase 1 (rơi thẳng) đã ổn định hoàn toàn.
  // Mỗi cột có một "mặt sàn" vật lý: cột so le (reel 2/4/6) sàn ở độ cao 0.5 (khối riser LUÔN
  // tồn tại, kể cả khi cột đó rỗng), cột thường sàn ở độ cao 0. Symbol ở hàng r trong 1 cột
  // chiếm khe [floor(c)+r, floor(c)+r+1]. Vật chất của 1 cột (riser + toàn bộ symbol xếp chồng
  // liên tục phía trên) luôn phủ kín từ độ cao 0 tới effHeight(c) — không có khoảng hở ở giữa.
  //
  // Một symbol tại (c,r) bị KHOÁ (lock) nếu cả 2 cột bên cạnh đều có vật chất che phủ đáy khe
  // của nó (effHeight(kề) > floor(c)+r) — viền bàn (không có cột kề) luôn tính là chặn.
  // Nếu hở ít nhất 1 bên → KHÔNG khoá (unlock).
  //
  // ƯU TIÊN TRÁI TOÀN CỤC: mỗi "phase", nếu ở BẤT KỲ ĐÂU trên bàn có ít nhất 1 symbol hở bên
  // trái (kể cả hở cả 2 bên), phase đó CHỈ xử lý hướng trái; ngược lại mới xử lý hướng phải.
  //
  // GỘP DOMINO CÙNG HƯỚNG: trong 1 phase, nếu 1 symbol lăn đi làm symbol phía sau nó (cùng
  // hướng) chuyển từ lock sang unlock, symbol đó lăn tiếp NGAY trong phase này (tính lại ngay,
  // không chờ đợt sau) — toàn bộ dây chuyền cùng hướng được gộp lại và lăn ĐỒNG THỜI trong 1
  // lần render/animation. Chỉ khi dây chuyền cùng hướng đã cạn (không ai unlock thêm được nữa)
  // mới render + nghỉ 1 lần cho cả phase, rồi mới xét tiếp phase kế (có thể đổi hướng).
  function colFloor(c){ return STAGGER_COLS.has(c) ? 0.5 : 0; }
  function effHeight(c){
    return board[c].filter(x=>x).length + colFloor(c);
  }
  // Trả về {left:[{c,r,cell}], right:[{c,r,cell}]} — toàn bộ symbol đang unlock trên bàn hiện tại
  function classifyUnlocked(){
    const eff = [];
    for(let c=0;c<COLS;c++) eff[c] = effHeight(c);
    const left = [], right = [];
    for(let c=0;c<COLS;c++){
      const floor = colFloor(c);
      const count = board[c].filter(x=>x).length;
      for(let r=0;r<count;r++){
        const slotBottom = floor + r;
        const leftBlocked  = (c>0)      ? (eff[c-1] > slotBottom) : true; // viền = luôn chặn
        const rightBlocked = (c<COLS-1) ? (eff[c+1] > slotBottom) : true;
        if(leftBlocked && rightBlocked) continue; // bị khoá, đứng yên
        if(!leftBlocked) left.push({c, r, cell: board[c][r]});
        else right.push({c, r, cell: board[c][r]});
      }
    }
    return {left, right};
  }
  // Áp 1 nhóm symbol unlock (cùng hướng) vào board ngay lập tức (không animation, không sleep)
  function applyMoves(moves, dir){
    const removeSets = Array.from({length:COLS}, ()=>new Set());
    for(const m of moves) removeSets[m.c].add(m.r);
    const kept = Array.from({length:COLS}, ()=>[]);
    for(let c=0;c<COLS;c++){
      for(let r=0;r<board[c].length;r++){
        const cell = board[c][r];
        if(cell && !removeSets[c].has(r)) kept[c].push(cell);
      }
    }
    const bySource = Array.from({length:COLS}, ()=>[]);
    for(const m of moves) bySource[m.c].push(m);
    for(let c=0;c<COLS;c++) bySource[c].sort((a,b)=>a.r-b.r); // dưới lên trên
    for(let c=0;c<COLS;c++){
      const target = dir==="left" ? c-1 : c+1;
      for(const m of bySource[c]) kept[target].push(m.cell);
    }
    for(let c=0;c<COLS;c++){
      while(kept[c].length < ROWS) kept[c].push(null);
      board[c] = kept[c];
    }
  }
  async function settleAvalanche(){
    let phase = 0;
    while(phase < 60){
      const {left, right} = classifyUnlocked();
      if(left.length===0 && right.length===0) break;
      const activeDir = left.length>0 ? "left" : "right";

      // Gộp toàn bộ dây chuyền cùng hướng thành 1 phase — tính lại liên tục, KHÔNG sleep,
      // cho tới khi không còn ai unlock theo hướng này nữa.
      const movedCells = [];
      let innerSteps = 0;
      while(innerSteps < 100){
        const cl = classifyUnlocked();
        const pool = activeDir === "left" ? cl.left : cl.right;
        if(pool.length === 0) break;
        applyMoves(pool, activeDir);
        movedCells.push(...pool.map(o=>o.cell));
        innerSteps++;
      }

      // Render + animate TOÀN BỘ symbol vừa lăn trong phase này cùng 1 lúc
      movedCells.forEach(cell=>spinCandy(cell.el, activeDir));
      syncVisuals();
      phase++;
      await sleep(368);
    }
  }

  function spinCandy(el, dir){
    el.classList.remove("rolling-left","rolling-right");
    void el.offsetWidth; // force reflow so the animation restarts each step
    el.classList.add(dir==="left" ? "rolling-left" : "rolling-right");
  }

  // ===================== CLUSTER DETECTION =====================
  // Reel 1,3,5 (0-indexed) so le nửa-cell, nên 2 ô "cùng hàng, cột kề" không còn thẳng hàng
  // trên màn hình — chúng nhìn như lệch chéo. Hàm này trả về đúng ô hàng xóm THEO HÌNH ẢNH
  // (kiểu tổ ong): cột kề bị chặn theo hướng lệch, mỗi cột kề chạm 2 hàng thay vì 1.
  function getVisualNeighbors(c, r){
    const neighbors = [[c,r-1],[c,r+1]]; // cùng cột: luôn kề trên/dưới
    for(const nc of [c-1, c+1]){
      if(nc<0 || nc>=COLS) continue;
      const meRaised = STAGGER_COLS.has(c);
      const otherRaised = STAGGER_COLS.has(nc);
      if(meRaised === otherRaised){
        neighbors.push([nc, r]);
      } else if(meRaised && !otherRaised){
        neighbors.push([nc, r]);
        neighbors.push([nc, r+1]);
      } else {
        neighbors.push([nc, r]);
        neighbors.push([nc, r-1]);
      }
    }
    return neighbors.filter(([cc,rr]) => cc>=0 && cc<COLS && rr>=0 && rr<ROWS);
  }

  function findClusters(){
    const clusters = [];
    for(const t of PAY_TYPES){
      const visited = Array.from({length:COLS}, ()=>new Array(ROWS).fill(false));
      for(let c=0;c<COLS;c++){
        for(let r=0;r<ROWS;r++){
          const cell = board[c][r];
          if(!cell || visited[c][r] || cell.type!==t) continue;
          const stack=[[c,r]]; visited[c][r]=true; const group=[];
          while(stack.length){
            const [cc,rr] = stack.pop(); group.push([cc,rr]);
            for(const [nc,nr] of getVisualNeighbors(cc,rr)){
              if(visited[nc][nr]) continue;
              const nb = board[nc][nr];
              if(nb && (nb.type===t || nb.type==="WILD")){ visited[nc][nr]=true; stack.push([nc,nr]); }
            }
          }
          if(group.length>=MIN_CLUSTER) clusters.push({type:t, cells:group});
        }
      }
    }
    // pure wild-only clusters
    {
      const visited = Array.from({length:COLS}, ()=>new Array(ROWS).fill(false));
      for(let c=0;c<COLS;c++){
        for(let r=0;r<ROWS;r++){
          const cell = board[c][r];
          if(!cell || cell.type!=="WILD" || visited[c][r]) continue;
          const stack=[[c,r]]; visited[c][r]=true; const group=[];
          while(stack.length){
            const [cc,rr]=stack.pop(); group.push([cc,rr]);
            for(const [nc,nr] of getVisualNeighbors(cc,rr)){
              if(visited[nc][nr]) continue;
              const nb = board[nc][nr];
              if(nb && nb.type==="WILD"){ visited[nc][nr]=true; stack.push([nc,nr]); }
            }
          }
          if(group.length>=MIN_CLUSTER) clusters.push({type:"WILD", cells:group});
        }
      }
    }
    return clusters;
  }

  // ===================== ONE AVALANCHE CYCLE =====================
  // Detect wins (cluster ≥5, liền kề theo so le) -> pay -> clear -> settle (rơi thẳng rồi lăn chéo) -> refill.
  // Returns total symbols cleared this cycle (0 if no win = cascade over).
  async function resolveOneAvalanche(totalRef){
    const clusters = findClusters();
    if(clusters.length===0) return 0;

    avalancheCount++;
    let stepWin = 0;
    const cells = new Set();
    const clusterWins = []; // {type, size, baseWin, cellsList, cellTypes}
    clusters.forEach(cl=>{
      const baseWin = bet * payMultiplier(cl.type, cl.cells.length);
      const cellTypes = cl.cells.map(([c,r])=> board[c][r] ? board[c][r].type : cl.type);
      clusterWins.push({type: cl.type, size: cl.cells.length, baseWin, cellsList: cl.cells, cellTypes});
      stepWin += baseWin;
      cl.cells.forEach(([c,r])=>cells.add(c+","+r));
    });
    totalRef.value += stepWin;
    balance += stepWin;
    updateHUD(totalRef.value);

    for(const key of cells){ const [c,r]=key.split(",").map(Number); board[c][r].el.classList.add("win"); }
    await sleep(480);

    // ===== PLINKO: chạy HOÀN TOÀN NGẦM, không chờ nữa =====
    // Bi Plinko rơi độc lập với tumble/avalanche — cascade tiếp theo (kể cả vòng
    // resolveOneAvalanche MỚI) không cần đợi Plinko xong. Tiền thắng Plinko được cộng vào
    // totalRef/balance ngay khi nó xong, bất kể lúc đó round đang ở bước nào. Round chỉ đảm bảo
    // chờ hết các promise Plinko còn treo (pendingPlinkoPromises) trước khi thực sự kết thúc,
    // để không mất tiền / không kết thúc round khi bi vẫn còn đang rơi.
    if(window.PlinkoFeature && clusterWins.length>0){
      for(const cw of clusterWins){
        const p = window.PlinkoFeature.runForCluster(cw, bet).then(bonusWin=>{
          if(bonusWin !== 0){
            totalRef.value += bonusWin;
            balance += bonusWin;
            updateHUD(totalRef.value);
          }
        });
        pendingPlinkoPromises.push(p);
      }
    }

    for(const key of cells){
      const [c,r]=key.split(",").map(Number);
      const cell = board[c][r];
      if(cell){ cell.el.classList.remove("win"); cell.el.classList.add("clearing"); }
    }
    await sleep(220);
    for(const key of cells){
      const [c,r]=key.split(",").map(Number);
      const cell = board[c][r];
      if(cell){ cell.el.remove(); board[c][r]=null; }
    }

    await settleGravity();     // 1. rơi thẳng 90° trước
    await sleep(72);
    await settleAvalanche();   // 2. avalanche — lăn chéo sau khi đã rơi thẳng xong

    await sleep(fillColumns());

    return cells.size;
  }

  // ===================== LEVEL FEATURES (biến đổi symbol theo mốc) =====================
  // Level không còn nhân tiền trực tiếp nữa — bảng multiplier Plinko tự đổi theo level (xem
  // PlinkoFeature.setLevel). Mỗi lần ĐẠT mốc mới, sau khi cascade hiện tại hoàn toàn hết win
  // (không còn cluster nào), áp dụng ĐÚNG 1 LẦN tính năng biến symbol tương ứng, rồi để vòng
  // avalanche mới kiểm tra lại (vì biến đổi có thể tạo cluster mới ăn tiếp).
  function updateLevelBadgeUI(){
    const badge = document.getElementById("plinkoLevelBadge");
    if(!badge) return;
    if(inFreeSpins){ badge.textContent = "FREE GAME — Level 3"; return; }
    badge.textContent = "Level hiện tại: " + levelReached;
  }

  function getAllCells(){
    const list = [];
    for(let c=0;c<COLS;c++) for(let r=0;r<ROWS;r++){
      const cell = board[c][r];
      if(cell) list.push(cell);
    }
    return list;
  }
  function shuffle(arr){
    for(let i=arr.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [arr[i],arr[j]] = [arr[j],arr[i]];
    }
    return arr;
  }

  // Level 1: biến 1 lowpay bất kỳ thành 1 highpay ngẫu nhiên
  async function featureLowToHigh(){
    const candidates = shuffle(getAllCells().filter(cell=>LOWPAY.has(cell.type)));
    if(candidates.length===0) return;
    const cell = candidates[0];
    await staggeredTransform([cell], c=>{
      c.type = HIGH_TYPES[Math.floor(Math.random()*HIGH_TYPES.length)];
      setOrbClass(c);
    });
  }

  // Level 2 & 3: biến 1 highpay bất kỳ thành WILD
  async function featureHighToWild(){
    const candidates = shuffle(getAllCells().filter(cell=>HIGHPAY.has(cell.type)));
    if(candidates.length===0) return;
    const cell = candidates[0];
    await staggeredTransform([cell], c=>{
      c.type = "WILD";
      setOrbClass(c);
    });
  }

  // Free game: 1 hình lục giác (1 ô trung tâm + các ô hàng xóm thị giác) ngẫu nhiên biến hết
  // thành WILD — dùng đúng getVisualNeighbors (hex-adjacency) như cluster detection.
  async function featureHexagonWild(){
    const all = shuffle(getAllCells().map((cell,idx)=>idx));
    const nonEmpty = [];
    for(let c=0;c<COLS;c++) for(let r=0;r<ROWS;r++) if(board[c][r]) nonEmpty.push([c,r]);
    if(nonEmpty.length===0) return;
    const [cc,cr] = nonEmpty[Math.floor(Math.random()*nonEmpty.length)];
    const hexCoords = [[cc,cr], ...getVisualNeighbors(cc,cr)];
    const hexCells = [];
    const seen = new Set();
    for(const [c,r] of hexCoords){
      const key = c+","+r;
      if(seen.has(key)) continue;
      seen.add(key);
      const cell = board[c] && board[c][r];
      if(cell) hexCells.push(cell);
    }
    if(hexCells.length===0) return;
    await staggeredTransform(hexCells, cl=>{
      cl.type = "WILD";
      setOrbClass(cl);
    });
  }

  // Áp dụng tính năng đúng 1 lần cho level vừa đạt (gọi SAU KHI cascade hiện tại hết win hẳn).
  async function applyLevelFeatureOnce(level){
    if(level<=0 || level>3) return;
    const title = "LEVEL " + level;
    let content = "";
    if(level===1){ await featureLowToHigh(); content = "1 biểu tượng thường đã biến thành biểu tượng cao cấp!"; }
    else if(level===2){ await featureHighToWild(); content = "1 biểu tượng cao cấp đã biến thành WILD!"; }
    else if(level===3){ await featureHighToWild(); content = "1 biểu tượng cao cấp đã biến thành WILD!"; }
    window.PlinkoFeature && window.PlinkoFeature.setLevel(level, false);
    updateLevelBadgeUI();
    await showFeatureBanner(title, content, 1800);
  }

  // ===================== ONE FULL ROUND (spin or free-spin) =====================
  async function playRound(totalRef, opts){
    opts = opts || {};
    const freeGame = !!opts.freeGame;
    let clearedThisRound = 0;
    pendingPlinkoPromises = []; // reset đầu mỗi round — theo dõi riêng cho round này

    let fillWaitMs = 0;
    if(freeGame){
      // Free game: board vẫn reset mỗi spin (reel cố định 3x6, không còn khái niệm "giữ hình
      // dạng cũ" vì không có gì để giữ — luôn full 3x6 ngay từ đầu)
      resetBoard();
      fillWaitMs = fillColumns();
      levelReached = 3; // free game: luôn cố định ở level 3 (bảng riêng), không tính lại từ đầu
      window.PlinkoFeature && window.PlinkoFeature.setLevel(3, true);
      updateLevelBadgeUI();
    } else {
      resetBoard();
      fillWaitMs = fillColumns();
    }
    await sleep(fillWaitMs);

    while(true){
      // ----- 1 cascade: nổ cụm liên tiếp cho tới khi hết win -----
      let cascadeCleared = 0;
      while(true){
        const cleared = await resolveOneAvalanche(totalRef);
        if(cleared===0) break;
        cascadeCleared += cleared;
        clearedThisRound += cleared;
        updateLevelUI(clearedThisRound);
      }

      if(freeGame){
        // free game: mỗi vòng (spin) áp dụng đúng 1 lần hexagon-wild rồi để cascade tiếp nếu ăn tiếp
        if(!opts._hexApplied){
          opts._hexApplied = true;
          const hadCells = getAllCells().length>0;
          if(hadCells){
            await featureHexagonWild();
            continue; // hexagon có thể tạo cluster mới — quay lại cascade
          }
        }
        break;
      }

      // ----- non-free game: kiểm tra có vừa đạt mốc mới không (chỉ 1 mốc/lần, thấp nhất trước) -----
      const capBand = Math.min(levelBand(clearedThisRound), 3);
      if(levelReached < capBand){
        levelReached++;
        await applyLevelFeatureOnce(levelReached);
        continue; // biến đổi có thể tạo cluster mới — quay lại cascade để ăn tiếp
      }

      break; // không còn win, không có mốc mới để áp dụng — kết thúc round
    }

    // Cascade đã hết win — nhưng Plinko có thể vẫn còn bi đang rơi ngầm từ các cụm cuối cùng.
    // Chờ hết TẤT CẢ trước khi round thực sự kết thúc, để không mất tiền / không hiển thị
    // sai kết quả WIN khi bi vẫn đang rơi.
    if(pendingPlinkoPromises.length){
      await Promise.all(pendingPlinkoPromises);
    }

    const band = levelBand(clearedThisRound);
    updateLevelUI(clearedThisRound);
    return band;
  }

  async function runFreeSpins(totalRef){
    inFreeSpins = true;
    stageEl.classList.add("fs-mode");
    while(freeSpinsRemaining>0){
      showBanner("🎰 FREE SPIN — còn " + freeSpinsRemaining + " lượt");
      freeSpinsRemaining--;
      updateFsUI();
      await sleep(400);
      const band = await playRound(totalRef, {freeGame:true});
      if(band===4){
        freeSpinsRemaining += 4;
        updateFsUI();
        showBanner("🔁 RETRIGGER +4 FREE SPINS!");
        await sleep(600);
      }
      await sleep(300);
    }
    inFreeSpins = false;
    stageEl.classList.remove("fs-mode");
    levelReached = 0;
    window.PlinkoFeature && window.PlinkoFeature.setLevel(0, false);
    updateLevelBadgeUI();
    showBanner("Free Spins kết thúc!");
  }

  // ===================== MAIN SPIN =====================
  async function spin(){
    if(spinning) return;
    if(balance < bet){ showBanner("Không đủ số dư!"); return; }
    spinning = true; spinBtn.disabled = true; spinBtn.classList.add("is-spinning");

    balance -= bet;
    avalancheCount = 0;
    const totalRef = {value:0};
    updateHUD(0); updateLevelUI(0); updateLevelBadgeUI();

    const band = await playRound(totalRef);

    if(band===4){
      freeSpinsRemaining += 4;
      updateFsUI();
      await showFeatureBanner("FREE SPINS WON", "Bạn đã thắng 4 FREE SPINS!", 2600);
      await runFreeSpins(totalRef);
    }

    if(totalRef.value>0) showBanner("WIN "+totalRef.value.toFixed(2));
    spinning = false; spinBtn.disabled = false; spinBtn.classList.remove("is-spinning");

    if(autoPlay && balance>=bet) setTimeout(spin, 550);
    else if(autoPlay){ autoPlay=false; autoBtn.classList.remove("active"); }
  }

  // ===================== CONTROLS =====================
  document.getElementById("betMinus").addEventListener("click", ()=>{
    if(spinning) return;
    bet = Math.max(0.2, +(bet-0.2).toFixed(2));
    betLabelEl.textContent = bet.toFixed(2);
  });
  document.getElementById("betPlus").addEventListener("click", ()=>{
    if(spinning) return;
    bet = +(bet+0.2).toFixed(2);
    betLabelEl.textContent = bet.toFixed(2);
  });
  spinBtn.addEventListener("click", spin);
  autoBtn.addEventListener("click", ()=>{
    autoPlay = !autoPlay;
    autoBtn.classList.toggle("active", autoPlay);
    if(autoPlay && !spinning) spin();
  });

  // idle board
  resetBoard(); fillColumns();
  updateHUD(0); updateLevelUI(0); updateFsUI(); updateLevelBadgeUI();
})();

// ===================== CLUSTER PLINKO MODULE =====================
// Bàn Plinko luôn hiển thị cố định dưới reel (không ẩn/hiện theo cluster nữa). Mỗi khi 1 cụm
// symbol nổ thành công ở game chính, module này chọn viên bi đại diện cho cụm đó (đúng skin
// symbol) và thả rơi qua các chốt xuống 1 khay multiplier ở đáy. Kết quả cuối:
//   totalWin = baseWin (bet × payMultiplier của cụm) × slotMultiplier (khay Plinko) × levelMultiplier
// Phần dôi ra so với baseWin ban đầu (đã cộng vào HUD bởi resolveOneAvalanche) được trả về đây
// để cộng thêm vào tổng thắng của vòng chơi. Độc lập hoàn toàn với RNG/luồng avalanche chính —
// chỉ đọc dữ liệu cụm vừa nổ rồi trả về số tiền thắng thêm; không đụng vào state game khác.
window.PlinkoFeature = (function(){
  "use strict";

  const ROWS = 7;              // số hàng chốt
  const W = 320, H = 210;      // giảm H để hàng chốt cuối gần khay multiplier hơn, bớt khoảng trống thừa
  const TOP_Y = 18, ROW_GAP = 27;   // chốt dãn dọc thưa hơn (22 → 27)
  const PEG_R = 4.5;                // chốt to hơn (3 → 4.5)
  const PEG_GAP_X = 34;             // chốt dãn ngang thưa hơn (28 → 34)
  const SLOT_COUNT = ROWS;     // 7 khay ở đáy

  // Bảng multiplier Plinko giờ ĐỔI TOÀN BỘ theo level đạt được (không còn levelMultiplier nhân
  // riêng nữa). Mỗi bộ có 7 giá trị đối xứng quanh khay giữa (khay giữa luôn = 0x).
  const SLOT_TABLES = {
    0: [0.5, 0.2, 0.1, 0, 0.1, 0.2, 0.5],   // level 0 (dưới 10)
    1: [1,   0.5, 0.2, 0, 0.2, 0.5, 1],     // level 1 (10-20)
    2: [2,   1,   0.2, 0, 0.2, 1,   2],     // level 2 (20-40)
    3: [20,  2,   1,   0, 1,   2,   20],    // level 3 (40-60)
    free: [50, 2, 1, 0, 1, 2, 50]           // free game
  };
  let currentLevel = 0;
  let currentFreeGame = false;
  function activeSlotMult(){
    return currentFreeGame ? SLOT_TABLES.free : (SLOT_TABLES[currentLevel] || SLOT_TABLES[0]);
  }
  function setLevel(level, freeGame){
    currentLevel = level || 0;
    currentFreeGame = !!freeGame;
    if(slotEls.length) refreshSlotLabels();
  }
  function refreshSlotLabels(){
    const table = activeSlotMult();
    slotEls.forEach((el,i)=>{ el.textContent = table[i] + "x"; });
  }

  const svgWrap = document.getElementById("plinkoSvgWrap");
  const subEl = document.getElementById("plinkoSub");
  const resultEl = document.getElementById("plinkoResult");

  let pegPositions = [];
  let slotEls = [];

  function sleep(ms){ return new Promise(res=>setTimeout(res, ms)); }

  function buildBoard(){
    if(!svgWrap) return;
    svgWrap.innerHTML = "";
    pegPositions = [];
    slotEls = [];

    const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
    svg.setAttribute("preserveAspectRatio", "xMidYMid meet");

    // pegs: hàng r có (r+2) chốt, căn giữa — hình tam giác Plinko chuẩn, không lệch stagger
    for(let r=0; r<ROWS; r++){
      const count = r + 2;
      const rowW = (count-1) * PEG_GAP_X;
      const startX = W/2 - rowW/2;
      const y = TOP_Y + r*ROW_GAP;
      const rowArr = [];
      for(let i=0;i<count;i++){
        const x = startX + i*PEG_GAP_X;
        rowArr.push({x,y});
        const c = document.createElementNS("http://www.w3.org/2000/svg","circle");
        c.setAttribute("cx", x); c.setAttribute("cy", y); c.setAttribute("r", PEG_R);
        c.setAttribute("class","plinko-peg");
        svg.appendChild(c);
      }
      pegPositions.push(rowArr);
    }
    svgWrap.appendChild(svg);

    const slotsRow = document.createElement("div");
    slotsRow.className = "plinko-slots-row";
    const table = activeSlotMult();
    for(let i=0;i<SLOT_COUNT;i++){
      const el = document.createElement("div");
      el.className = "plinko-slot";
      const hue = 40 - Math.abs(i-(SLOT_COUNT-1)/2)*7;
      el.style.background = `linear-gradient(180deg, hsl(${hue} 85% 68%), hsl(${hue} 75% 48%))`;
      el.textContent = table[i] + "x";
      slotsRow.appendChild(el);
      slotEls.push(el);
    }
    svgWrap.appendChild(slotsRow);
  }

  function pctToPx(){
    const rect = svgWrap.getBoundingClientRect();
    return { scaleX: rect.width / W, scaleY: rect.width / W };
  }

  function orbSkinFor(type){
    const map = {
      L1:"--img-l1", L2:"--img-l2", L3:"--img-l3", L4:"--img-l4",
      H1:"--img-h1", H2:"--img-h2", H3:"--img-h3", H4:"--img-h4",
      WILD:"--img-wild"
    };
    return map[type] || null;
  }

  function createBallEl(){
    const el = document.createElement("div");
    el.className = "plinko-ball";
    el.style.opacity = "0";
    svgWrap.appendChild(el);
    return el;
  }

  // Thả 1 viên bi (dùng ballEl riêng được truyền vào) — trả về slotMult của khay nó rơi vào.
  async function dropBall(type, ballEl){
    const {scaleX, scaleY} = pctToPx();
    let x = W/2, y = 4;
    ballEl.style.opacity = "1";
    ballEl.style.transform = `translate(${x*scaleX - 8}px, ${y*scaleY - 8}px)`;

    const skinVar = orbSkinFor(type);
    if(skinVar){
      ballEl.style.backgroundImage = `var(${skinVar})`;
      ballEl.style.backgroundSize = "cover";
      ballEl.style.backgroundColor = "transparent";
    } else {
      ballEl.style.backgroundImage = "none";
    }

    let col = 0;
    for(let r=0; r<ROWS; r++){
      const row = pegPositions[r];
      const goRight = Math.random() < 0.5;
      col = Math.max(0, Math.min(row.length-1, col + (goRight?1:0)));
      const target = row[Math.min(col, row.length-1)];
      const steps = 4;
      for(let s=1; s<=steps; s++){
        const t = s/steps;
        const nx = x + (target.x - x)*t;
        const ny = y + (target.y - y)*t + Math.sin(t*Math.PI)*2;
        ballEl.style.transform = `translate(${nx*scaleX - 8}px, ${ny*scaleY - 8}px)`;
        await sleep(24);
      }
      x = target.x; y = target.y;
    }

    const lastRowLen = pegPositions[ROWS-1].length;
    let slotIndex = Math.round((col / (lastRowLen-1)) * (SLOT_COUNT-1));
    slotIndex = Math.max(0, Math.min(SLOT_COUNT-1, slotIndex));
    const targetSlotEl = slotEls[slotIndex];
    const slotRect = targetSlotEl.getBoundingClientRect();
    const wrapRect = svgWrap.getBoundingClientRect();
    const finalX = (slotRect.left - wrapRect.left) + slotRect.width/2 - 8;
    const finalY = (slotRect.top - wrapRect.top) - 6;
    ballEl.style.transform = `translate(${finalX}px, ${finalY}px)`;
    await sleep(150);

    targetSlotEl.classList.add("hit");
    await sleep(280);
    targetSlotEl.classList.remove("hit");
    ballEl.style.opacity = "0";

    return activeSlotMult()[slotIndex];
  }

  // Thả TOÀN BỘ symbol trong cluster xuống Plinko cùng lúc (mỗi ô 1 viên bi riêng, đúng skin
  // của ô đó — kể cả Wild), thay vì chỉ 1 bi đại diện. Mỗi bi ăn phần chia đều baseWin/size,
  // nhân với slotMult riêng của bi đó; tổng bonus = tổng(phần chia × slotMult) − baseWin gốc.
  // Chạy HOÀN TOÀN ĐỘC LẬP giữa các cluster — không còn khoá "busy" xếp hàng nữa, để nhiều
  // cluster (kể cả từ các đợt tumble/cascade khác nhau) có thể thả bi chồng thời gian tự do.
  async function runForCluster(clusterWin, bet){
    if(!svgWrap) return 0;
    if(pegPositions.length===0) buildBoard();

    const size = clusterWin.size;
    const types = (clusterWin.cellTypes && clusterWin.cellTypes.length===size)
      ? clusterWin.cellTypes
      : Array.from({length:size}, ()=>clusterWin.type);
    const share = clusterWin.baseWin / size;

    if(subEl) subEl.textContent = `${size} bi từ cụm ${clusterWin.type} đang rơi...`;
    if(resultEl) resultEl.textContent = "\u00A0";

    // Tạo N ball element, thả song song với lệch nhẹ (stagger) cho đẹp mắt, không chờ lần lượt.
    const balls = types.map(()=>createBallEl());
    const dropPromises = types.map((t, i) => (async()=>{
      if(i>0) await sleep(i * (300 + Math.random()*200) / Math.max(1,types.length-1) * 0.6);
      const slotMult = await dropBall(t, balls[i]);
      return share * slotMult;
    })());

    const results = await Promise.all(dropPromises);
    balls.forEach(b=>b.remove());

    const totalWin = results.reduce((a,b)=>a+b, 0);
    const bonusWin = totalWin - clusterWin.baseWin; // phần dôi ra cần cộng thêm vào tổng thắng
    if(resultEl){
      resultEl.textContent = totalWin >= clusterWin.baseWin
        ? `${size} bi — Thắng thêm ${bonusWin.toFixed(2)}!`
        : `${size} bi — Giảm nhẹ lần này`;
    }

    return bonusWin;
  }

  buildBoard(); // hiển thị ngay từ đầu — Plinko luôn cố định, không chờ cluster đầu tiên

  return { runForCluster, setLevel };
})();


(function(){
  "use strict";
  const inner = document.getElementById("scaleInner");
  const wrap = inner.parentElement;

  function fitScale(){
    inner.style.transform = "scale(1)";
    const naturalW = inner.offsetWidth;
    const naturalH = inner.offsetHeight;
    const availW = window.innerWidth - 8;
    const availH = (window.visualViewport ? window.visualViewport.height : window.innerHeight) - 8;
    const scale = Math.min(1, availW / naturalW, availH / naturalH);
    inner.style.transform = "scale(" + scale + ")";
    wrap.style.height = Math.ceil(naturalH * scale) + "px";
  }

  window.addEventListener("load", fitScale);
  window.addEventListener("resize", fitScale);
  window.addEventListener("orientationchange", ()=>setTimeout(fitScale, 300));
  if(window.visualViewport) window.visualViewport.addEventListener("resize", fitScale);
  setTimeout(fitScale, 50);
  setTimeout(fitScale, 400);
  fitScale();
})();
</script>
